name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unit tests (no external dependencies) ──
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib -- --skip harness::session::tests

  # ── Agent-core tests (exclude E2E provider tests that need real API keys) ──
  agent-core:
    name: Agent Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p agent-core --tests -- --skip integration_emerald

  # ── Storage + API Gateway E2E tests (need PostgreSQL + Redis) ──
  storage-and-e2e:
    name: Storage & E2E (PostgreSQL + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PANDARIA_TEST_PG_URL: postgres://postgres:postgres@localhost:15432/postgres
      PANDARIA_TEST_REDIS_URL: redis://localhost:16379

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run storage integration tests (PostgreSQL)
        run: cargo test -p storage --test integration_postgres -- --test-threads=1

      - name: Run storage integration tests (Redis)
        run: cargo test -p storage --test integration_redis -- --test-threads=1

      - name: Run API Gateway E2E tests
        run: cargo test -p api-gateway --tests -- --test-threads=1

  # ── Clippy ──
  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ── Format check ──
  fmt:
    name: Rustfmt Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
